name: Log Analyzer CI

on: [push]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Analyzer
        run: python analyzer.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: log-report
          path: report.txt
